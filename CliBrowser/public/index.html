<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111118">
  <title>NuclusCli</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="titlebar">
      <div id="drag-region">
        <span id="app-title">NuclusCli</span>
      </div>
      <div id="titlebar-actions">
        <button id="theme-btn" class="tb-btn" title="Toggle theme">☀</button>
        <button id="settings-btn" class="tb-btn" title="AI Settings">⚙</button>
      </div>
      <div id="window-controls">
        <button class="win-btn" id="min-btn" title="Minimize">─</button>
        <button class="win-btn" id="max-btn" title="Maximize">□</button>
        <button class="win-btn" id="close-btn" title="Close">✕</button>
      </div>
    </header>

    <nav id="tab-bar">
      <div id="tab-list"></div>
      <button id="new-tab-btn" title="New Tab">+</button>
    </nav>

    <div id="navbar">
      <button class="nav-btn" id="nav-back" title="Back">◀</button>
      <button class="nav-btn" id="nav-fwd" title="Forward">▶</button>
      <button class="nav-btn" id="nav-refresh" title="Refresh">⟳</button>
      <div id="url-container">
        <input id="url-bar" type="text" placeholder="Search or enter URL...">
      </div>
      <button class="nav-btn" id="nav-go" title="Go">⏎</button>
    </div>

    <main id="content"></main>

    <!-- Config Modal -->
    <div id="config-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <span>AI Configuration</span>
          <button class="modal-close" id="cfg-modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="cfg-provider">Provider</label>
            <select id="cfg-provider">
              <option value="openai">OpenAI</option>
              <option value="openrouter">OpenRouter</option>
              <option value="anthropic">Anthropic</option>
              <option value="ollama">Ollama (local)</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="field">
            <label for="cfg-model">Model</label>
            <input id="cfg-model" type="text" placeholder="e.g. gpt-4o-mini" list="model-suggestions">
            <datalist id="model-suggestions">
              <option value="gpt-4o-mini">
              <option value="gpt-4o">
              <option value="claude-sonnet-4-20250514">
              <option value="claude-3-haiku-20240307">
              <option value="llama3.2">
            </datalist>
          </div>
          <div class="field">
            <label for="cfg-key">API Key</label>
            <input id="cfg-key" type="password" placeholder="sk-...">
          </div>
          <div class="field">
            <label for="cfg-url">Base URL <span class="label-hint">(optional)</span></label>
            <input id="cfg-url" type="text" placeholder="https://...">
          </div>
          <div id="cfg-status" class="cfg-status hidden"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="cfg-cancel">Cancel</button>
          <button class="btn btn-primary" id="cfg-save">Save & Test</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
