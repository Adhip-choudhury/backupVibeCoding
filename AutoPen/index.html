<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a2e4a">
  <meta name="description" content="Digital khata for auto-rickshaw drivers">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a2e4a'/%3E%3Ctext x='16' y='24' font-size='20' text-anchor='middle' fill='%23f59e0b'%3EA%3C/text%3E%3C/svg%3E">
  <title>AutoKhata</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBb9VgbHCP3Ixf7W_JQbdzEyZnPl9tmjNA",
      authDomain: "autokhata-88f52.firebaseapp.com",
      projectId: "autokhata-88f52",
      storageBucket: "autokhata-88f52.firebasestorage.app",
      messagingSenderId: "904757909642",
      appId: "1:904757909642:web:14b1cc6249f51067a1f573",
      measurementId: "G-6NNFFDKQT2"
    });
  </script>

  <div id="app">

    <!-- ============ AUTH SCREEN ============ -->
    <div id="auth-screen">
      <div class="auth-container">
        <div class="auth-brand">
          <div class="auth-logo">A</div>
          <h1 data-i18n="auth.welcome">Welcome to AutoKhata</h1>
          <p class="auth-subtitle" data-i18n="auth.subtitle">Track your dues, payments, and daily income easily</p>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label class="form-label" for="login-phone" data-i18n="auth.phone">Phone Number</label>
            <input type="tel" id="login-phone" class="form-input" inputmode="numeric" placeholder="98XXXXXXXX" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password" data-i18n="auth.password">Password</label>
            <input type="password" id="login-password" class="form-input" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" data-i18n="auth.login">Login</button>
          <p class="auth-switch">
            <span data-i18n="auth.noAccount">Don't have an account?</span>
            <a href="#" id="show-signup" data-i18n="auth.signupHere">Sign Up</a>
          </p>
        </form>

        <form id="signup-form" class="auth-form hidden">
          <div class="form-group">
            <label class="form-label" for="signup-name" data-i18n="auth.name">Your Name</label>
            <input type="text" id="signup-name" class="form-input" placeholder="e.g. Rajesh Kumar" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-phone" data-i18n="auth.phone">Phone Number</label>
            <input type="tel" id="signup-phone" class="form-input" inputmode="numeric" placeholder="98XXXXXXXX" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-password" data-i18n="auth.password">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="Create a password (min 6 chars)" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="signup-confirm" data-i18n="auth.confirmPassword">Confirm Password</label>
            <input type="password" id="signup-confirm" class="form-input" placeholder="Re-enter password" required>
          </div>
          <button type="submit" class="btn btn-accent btn-block btn-lg" data-i18n="auth.signup">Sign Up</button>
          <p class="auth-switch">
            <span data-i18n="auth.hasAccount">Already have an account?</span>
            <a href="#" id="show-login" data-i18n="auth.loginHere">Login</a>
          </p>
        </form>
      </div>
    </div>

    <!-- ============ MAIN APP ============ -->
    <div id="main-app" class="hidden">

      <div id="offline-banner">You are offline. Data will sync when connected.</div>

      <!-- SIDEBAR -->
      <aside id="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-logo">A</div>
          <div class="sidebar-brand-text">
            <span class="sidebar-title">AutoKhata</span>
            <span class="sidebar-subtitle" data-i18n="app.tagline">Digital Khata Book</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button class="sidebar-item active" data-nav="dashboard">
            <span class="si-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
            <span class="si-text" data-i18n="screen.dashboard">Home</span>
          </button>
          <button class="sidebar-item" data-nav="customers">
            <span class="si-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            <span class="si-text" data-i18n="screen.customers">Customers</span>
          </button>
          <button class="sidebar-item" data-nav="payments">
            <span class="si-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span>
            <span class="si-text" data-i18n="screen.payments">Analytics</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-user">
            <span class="sidebar-user-avatar" id="sidebar-user-avatar">U</span>
            <span class="sidebar-user-name" id="sidebar-user-name">User</span>
          </div>
          <button class="sidebar-item" id="sidebar-lang-btn">
            <span class="si-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
            <span id="sidebar-lang-label">English</span>
          </button>
          <button class="sidebar-item" id="sidebar-logout">
            <span class="si-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
            <span data-i18n="auth.logout">Logout</span>
          </button>
        </div>
      </aside>

      <div id="sidebar-overlay"></div>

      <!-- MAIN AREA -->
      <main id="main-area">
        <header id="topbar">
          <button id="menu-toggle" aria-label="Toggle menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="topbar-left">
            <h2 id="page-title">Dashboard</h2>
          </div>
          <div class="topbar-actions">
            <button class="btn btn-primary btn-sm" id="add-customer-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span data-i18n="customer.add">Add Customer</span>
            </button>
            <button class="btn-icon-only" id="lang-btn" aria-label="Language">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </button>
          </div>
        </header>

        <div id="app-content">

          <!-- DASHBOARD -->
          <div data-screen="dashboard" class="screen active">
            <div id="dashboard-content"></div>
          </div>

          <!-- CUSTOMERS -->
          <div data-screen="customers" class="screen">
            <div class="screen-toolbar">
              <div class="search-bar">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="customer-search" class="form-input" data-i18n="customer.search" placeholder="Search customers...">
              </div>
            </div>
            <div id="customers-list"></div>
          </div>

          <!-- CUSTOMER DETAIL -->
          <div data-screen="customer-detail" class="screen">
            <div id="customer-detail-content"></div>
          </div>

          <!-- ADD / EDIT CUSTOMER -->
          <div data-screen="add-customer" class="screen">
            <div class="screen-header"><h3 data-i18n="customer.add">Add Customer</h3></div>
            <div class="form-card">
              <form id="customer-form" novalidate>
                <input type="hidden" id="cf-customer-id">
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label" for="cf-name" data-i18n="customer.name">Customer Name <span class="required">*</span></label>
                    <input type="text" id="cf-name" class="form-input" required placeholder="e.g. Rajesh Kumar">
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="cf-phone" data-i18n="customer.phone">Phone Number</label>
                    <input type="tel" id="cf-phone" class="form-input" inputmode="numeric" placeholder="98XXXXXXXX">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label" for="cf-location" data-i18n="customer.location">Home / Location</label>
                  <input type="text" id="cf-location" class="form-input" placeholder="e.g. Andheri West">
                </div>
                <div class="form-actions">
                  <button type="button" class="btn btn-outline" id="cf-cancel" data-i18n="common.cancel">Cancel</button>
                  <button type="submit" class="btn btn-primary btn-lg" data-i18n="customer.save">Save Customer</button>
                </div>
              </form>
            </div>
          </div>

          <!-- ADD TRANSACTION -->
          <div data-screen="add-transaction" class="screen">
            <div class="screen-header"><h3 data-i18n="transaction.add">New Transaction</h3></div>
            <div class="form-card">
              <form id="transaction-form" novalidate>
                <input type="hidden" id="tf-customer-id">
                <div class="form-group">
                  <label class="form-label" for="tf-customer-select" data-i18n="transaction.selectCustomer">Select Customer <span class="required">*</span></label>
                  <select id="tf-customer-select" class="form-select" required><option value="">Choose a customer...</option></select>
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="transaction.type">Type <span class="required">*</span></label>
                  <div class="tx-type-grid" id="tf-type-selector">
                    <button type="button" class="tx-type-option" data-value="pending"><span class="tto-letter">P</span><span class="tto-label" data-i18n="transaction.pending">Pending</span></button>
                    <button type="button" class="tx-type-option" data-value="received"><span class="tto-letter">R</span><span class="tto-label" data-i18n="transaction.received">Received</span></button>
                  </div>
                  <input type="hidden" id="tf-type" value="">
                </div>
                <div class="form-group" id="pm-group" style="display:none">
                  <label class="form-label" data-i18n="transaction.paymentMode">Payment Mode</label>
                  <div class="pm-grid">
                    <button type="button" class="pm-option" data-value="cash">
                      <span class="pm-letter">C</span>
                      <span class="pm-label" data-i18n="pm.cash">Cash</span>
                    </button>
                    <button type="button" class="pm-option" data-value="upi">
                      <span class="pm-letter">U</span>
                      <span class="pm-label" data-i18n="pm.upi">UPI</span>
                    </button>
                  </div>
                  <input type="hidden" id="tf-pm" value="">
                </div>
                <div class="form-group">
                  <label class="form-label" for="tf-amount" data-i18n="transaction.amount">Amount (Rs) <span class="required">*</span></label>
                  <input type="number" id="tf-amount" class="form-input" min="0" step="1" inputmode="numeric" required placeholder="0">
                </div>
                <div class="form-actions">
                  <button type="button" class="btn btn-outline" id="tf-cancel" data-i18n="common.cancel">Cancel</button>
                  <button type="submit" class="btn btn-accent btn-lg" data-i18n="transaction.save">Save Transaction</button>
                </div>
              </form>
            </div>
          </div>

          <!-- PAYMENTS / ANALYTICS -->
          <div data-screen="payments" class="screen">
            <div id="payments-content"></div>
          </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav id="bottom-nav">
          <button class="nav-item active" data-nav="dashboard">
            <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
            <span class="nav-label" data-i18n="nav.dashboard">Home</span>
          </button>
          <button class="nav-item" data-nav="customers">
            <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            <span class="nav-label" data-i18n="nav.customers">Customers</span>
          </button>
          <button class="nav-item" data-nav="payments">
            <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></span>
            <span class="nav-label" data-i18n="nav.payments">Analytics</span>
          </button>
        </nav>
      </main>
    </div>

    <!-- LANGUAGE MODAL -->
    <div class="modal-overlay" id="lang-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 data-i18n="lang.select">Language</h3>
          <button class="modal-close" id="lang-modal-close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <button class="lang-card" data-lang="en"><span class="lang-dot"></span><span class="lang-name">English</span><span class="lang-check">OK</span></button>
          <button class="lang-card" data-lang="hi"><span class="lang-dot"></span><span class="lang-name">Hindi</span><span class="lang-check"></span></button>
          <button class="lang-card" data-lang="mr"><span class="lang-dot"></span><span class="lang-name">Marathi</span><span class="lang-check"></span></button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <script src="/js/db.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/service-worker.js').catch(() => {}); }</script>
</body>
</html>
